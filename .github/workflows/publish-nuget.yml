name: Publish NuGet Package

on:
  workflow_call:
    inputs:
      branch:
        required: true
        type: string
      version:
        required: true
        type: string
  workflow_dispatch:
    inputs:
      branch:
        required: true
        type: string
        description: 'The branch to build'
        default: 'main'
      version:
        required: true
        type: string
        description: 'The version to publish'

jobs:
  build-nuget:
    name: Build NuGet Package
    runs-on: windows-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}

      - name: Build Macro Deck assembly
        run: |
            dotnet restore "src\MacroDeck\MacroDeck.csproj"
            dotnet build "src\MacroDeck\MacroDeck.csproj" -c Release -o "src\MacroDeck\bin\Release" -r win-x64
        shell: cmd

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      - name: Pack NuGet package
        run: |
            nuget pack "src\MacroDeck\MacroDeck.nuspec" -BasePath "src\MacroDeck" -Version "${{ inputs.version }}" -OutputDirectory nupkg
        shell: cmd

      - name: Upload NuGet package artifact
        uses: actions/upload-artifact@v4
        with:
          name: nuget-package-${{ inputs.version }}
          path: nupkg\*.nupkg
          if-no-files-found: error

  publish-nuget:
    name: Publish NuGet Package
    runs-on: ubuntu-latest
    needs: build-nuget
    permissions:
      id-token: write

    steps:
      - name: Download NuGet package artifact
        uses: actions/download-artifact@v4
        with:
          name: nuget-package-${{ inputs.version }}
          path: nupkg

      - name: NuGet login (OIDC → temp API key)
        uses: NuGet/login@v1
        id: login
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Push to NuGet.org
        run: |
            dotnet nuget push "nupkg/*.nupkg" --api-key ${{ steps.login.outputs.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json
        shell: bash
